apiVersion: apps/v1
kind: Deployment
metadata:
  name: feelings-backend
  labels:
    app: feelings
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feelings
      component: backend
  template:
    metadata:
      labels:
        app: feelings
        component: backend
    spec:
      containers:
        - name: backend
          image: feelings-backend:latest
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: feelings-backend
  labels:
    app: feelings
    component: backend
spec:
  selector:
    app: feelings
    component: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
