apiVersion: apps/v1
kind: Deployment
metadata:
  name: feelings-frontend
  labels:
    app: feelings
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feelings
      component: frontend
  template:
    metadata:
      labels:
        app: feelings
        component: frontend
    spec:
      containers:
        - name: frontend
          image: feelings-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_URL
              value: "http://feelings-backend:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: feelings-frontend
  labels:
    app: feelings
    component: frontend
spec:
  selector:
    app: feelings
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: feelings-frontend
  labels:
    app: feelings
    component: frontend
spec:
  to:
    kind: Service
    name: feelings-frontend
  port:
    targetPort: 80